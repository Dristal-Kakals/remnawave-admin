name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Where signatures are stored (committed to the repo on `branch`)
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/Case211/remnawave-admin/blob/main/CLA.md'
          branch: 'main'
          # Maintainers and bots never need to sign
          allowlist: Case211,*[bot]
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prcomment: 'Пожалуйста, подпишите CLA — оставьте комментарий с текстом ниже. / Please sign the CLA by posting the comment below.'
          custom-allsigned-prcomment: '✅ Все контрибьюторы подписали CLA. / All contributors have signed the CLA.'
